site_name: Proteon
site_description: Rust-first structural bioinformatics toolkit — alignment, analysis, preparation, and search.
site_url: https://theGreatHerrLebert.github.io/proteon/
repo_url: https://github.com/theGreatHerrLebert/proteon
repo_name: theGreatHerrLebert/proteon
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - packages/proteon/src
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Why Proteon: WHY.md
  - Getting started:
      - Install: install.md
      - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Subsystems:
      - subsystems/index.md
      - I/O: subsystems/io.md
      - Alignment: subsystems/align.md
      - Geometry: subsystems/geometry.md
      - DSSP: subsystems/dssp.md
      - SASA: subsystems/sasa.md
      - H-bonds: subsystems/hbond.md
      - Forcefield / MD: subsystems/forcefield.md
      - Preparation: subsystems/prepare.md
      - Search: subsystems/search.md
      - Supervision: subsystems/supervision.md
  - Validation: validation.md
  - Oracle setup: ORACLE_SETUP.md
  - Rust API: rust.md
