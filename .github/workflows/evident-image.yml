name: EVIDENT image

# Builds the proteon-evident reproducibility image and pushes it to GHCR.
# The image bundles proteon + the oracle stack that backs the claims in
# proteon/evident/evident.yaml, plus the `evident` CLI for manifest
# validation and listing.
#
# Triggers:
#   - push to main (pushes :main tag for fresh consumers)
#   - tag push v* (pushes :<version> + :latest, paired with releases)
#   - manual workflow_dispatch (push :dispatch-<run> for ad-hoc replay)

on:
  push:
    branches: [main]
    tags: ["v*"]
  # On PRs that touch the image surface, build-only (no GHCR push, no
  # smoke pull). Catches Dockerfile / workflow regressions before they
  # reach main, without needing GHCR write permissions on a fork.
  pull_request:
    paths:
      - "evident/Dockerfile"
      - "evident/Dockerfile.cuda"
      - "evident/tools/**"
      - "evident/evident.yaml"
      - "evident/claims/**"
      - ".github/workflows/evident-image.yml"
      - ".dockerignore"
  workflow_dispatch:

# GHCR push needs `packages: write`; the image links to the repo via
# `org.opencontainers.image.source` so the package inherits the repo's
# visibility automatically.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Matrix over the two image variants. The slim variant carries the
    # GHCR-published default tag (:main / :sha-... / :v...); the cuda
    # variant pushes only on main / tag / dispatch with a cuda- prefix
    # so a broken CUDA Dockerfile cannot merge without CI exercising
    # it, but consumers without an NVIDIA runtime are unaffected.
    name: Build proteon-evident (${{ matrix.variant.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: slim
            dockerfile: evident/Dockerfile
            tag_prefix: ""
          - name: cuda
            dockerfile: evident/Dockerfile.cuda
            tag_prefix: "cuda-"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate EVIDENT manifest before building image
        # Run once per matrix cell so a manifest regression fails both
        # variants symmetrically; the work is sub-second.
        run: |
          python3 -m pip install --quiet pyyaml
          python3 evident/tools/validate_manifest.py evident/evident.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip on pull_request — fork PRs don't have package:write
        # against the upstream registry. Build-only PRs don't need it.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          TAG_PREFIX: ${{ matrix.variant.tag_prefix }}
        run: |
          # GHCR demands lowercase repo paths.
          IMAGE_BASE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/proteon-evident"
          TAGS="${IMAGE_BASE}:${TAG_PREFIX}sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE_BASE}:${TAG_PREFIX}${VERSION},${IMAGE_BASE}:${TAG_PREFIX}latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:${TAG_PREFIX}main"
          else
            TAGS="${TAGS},${IMAGE_BASE}:${TAG_PREFIX}dispatch-${GITHUB_RUN_ID}"
          fi
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "Tags: ${TAGS}"

      - name: Build image (load to local daemon)
        # `load: true` exports the built image into the local docker
        # daemon (via tarball under the docker-container driver) so
        # the smoke step below can run it before any GHCR push. This
        # is the key ordering: build -> load -> smoke -> push, with
        # the push gated on smoke success. A failing native-wheel
        # smoke now blocks publication of :main / :latest / :v...
        # rather than discovering the regression after consumers
        # already pulled the bad tag.
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.tags.outputs.tags }}
          # Per-variant cache scope so slim and cuda don't churn each
          # other's layer cache despite sharing the builder + oracle
          # stage Dockerfile prefix.
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
          # Annotate the image with the source SHA so a reviewer can
          # walk back from the GHCR digest to the producing commit
          # without consulting the workflow run.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Smoke-test built image
        # Runs on EVERY event, including pull_request — the image is
        # in the local daemon regardless of whether we will push. Both
        # variants run the same smoke; the cuda variant does NOT need
        # a GPU here because cudarc dlopens libcuda lazily and the
        # import succeeds without a GPU. That is the test that
        # catches a builder/runtime glibc mismatch on the cuda image
        # at the cdylib load step, which a GPU-only smoke would have
        # left undetected.
        env:
          TAG_PREFIX: ${{ matrix.variant.tag_prefix }}
        run: |
          IMAGE_BASE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/proteon-evident"
          TAG="${TAG_PREFIX}sha-${GITHUB_SHA::7}"
          docker run --rm "${IMAGE_BASE}:${TAG}" validate evident/evident.yaml
          docker run --rm "${IMAGE_BASE}:${TAG}" list evident/evident.yaml
          # Native-wheel import smoke. proteon_connector is the
          # PyO3 cdylib (Cargo.toml [lib] name = "proteon_connector");
          # importing it directly catches the case where the proteon
          # Python wrapper has an ImportError fallback that masks a
          # cdylib load failure (per reference_pyo3_coverage_trap).
          docker run --rm --entrypoint=python3 "${IMAGE_BASE}:${TAG}" \
              -c "import proteon_connector; import proteon; print('proteon native wheel ok')"

      - name: Push image (only after smoke passes)
        # Skipped on pull_request — fork PRs lack package:write and
        # PR builds intentionally do not publish. The image is
        # already tagged in the local daemon from the load-true build
        # above, so this step is a pure registry push, not a rebuild.
        if: github.event_name != 'pull_request'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker push "$tag"
          done
