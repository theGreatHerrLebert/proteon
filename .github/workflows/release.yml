name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # =========================================================================
  # Build ferritin-connector wheels (Rust + PyO3)
  # =========================================================================
  build-connector:
    name: Build connector - ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          # macOS x86_64
          - os: macos-13
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path ferritin-connector/Cargo.toml
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-connector-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # Build sdist for connector
  build-connector-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ferritin-connector/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-connector-sdist
          path: dist/*.tar.gz

  # =========================================================================
  # Build ferritin pure Python package
  # =========================================================================
  build-ferritin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build packages/ferritin/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-ferritin
          path: packages/ferritin/dist/*

  # =========================================================================
  # Publish to PyPI
  # =========================================================================
  publish-connector:
    name: Publish ferritin-connector to PyPI
    needs: [build-connector, build-connector-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ferritin-connector
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-connector-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-ferritin:
    name: Publish ferritin to PyPI
    needs: [build-ferritin, publish-connector]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ferritin
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ferritin
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
