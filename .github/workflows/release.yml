name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # =========================================================================
  # Build ferritin-connector wheels (Rust + PyO3)
  # =========================================================================
  build-connector:
    name: Build connector - ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          # macOS Apple Silicon only — Intel Mac support dropped as of
          # v0.1.2. Python 3.12+ is actively optimized for arm64, the
          # macos-13 x86_64 runner pool has degraded queue times (often
          # 30m+), and dropping the matrix entry removes that bottleneck
          # from every release. If Intel Mac demand resurfaces, restore
          # this by cross-compiling from the macos-14 runner with
          # target: x86_64-apple-darwin — not by bringing macos-13 back.
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # -i 3.11 -i 3.12 -i 3.13 is needed so maturin picks up every
          # supported interpreter. Inside the manylinux docker container
          # used for linux targets the default `python3` search can find
          # older interpreters we do not support, so enumerate the grid.
          args: --release --out dist --manifest-path ferritin-connector/Cargo.toml -i 3.11 -i 3.12 -i 3.13
          manylinux: ${{ matrix.manylinux || 'auto' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-connector-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # Build sdist for connector
  build-connector-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ferritin-connector/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-connector-sdist
          path: dist/*.tar.gz

  # =========================================================================
  # Build ferritin pure Python package
  # =========================================================================
  build-ferritin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build packages/ferritin/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-ferritin
          path: packages/ferritin/dist/*

  verify-distributions:
    name: Verify distributions (Python ${{ matrix.python-version }})
    needs: [build-connector, build-connector-sdist, build-ferritin]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-connector-*
          merge-multiple: true
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ferritin
          path: dist/
      - name: Install verification tools
        run: python -m pip install --upgrade pip twine
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Install built artifacts
        run: |
          PYTAG="$(python -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')"
          CONN_WHEEL="$(ls dist/ferritin_connector-*-${PYTAG}-${PYTAG}-*x86_64*.whl | head -n 1)"
          FERRITIN_WHEEL="$(ls dist/ferritin-*.whl | head -n 1)"
          test -n "$CONN_WHEEL"
          test -n "$FERRITIN_WHEEL"
          python -m pip install "$CONN_WHEEL" "$FERRITIN_WHEEL"
      - name: Smoke import
        run: |
          python - <<'PY'
          import importlib.metadata as metadata
          import ferritin
          import ferritin_connector

          assert ferritin.__version__ == metadata.version("ferritin")
          assert metadata.version("ferritin-connector")
          print("ferritin", ferritin.__version__)
          print("connector", ferritin_connector.__name__)
          PY

  # =========================================================================
  # Publish to PyPI
  # =========================================================================
  publish-connector:
    name: Publish ferritin-connector to PyPI
    if: github.event_name == 'release'
    needs: [build-connector, build-connector-sdist, verify-distributions]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ferritin-connector
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-connector-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-ferritin:
    name: Publish ferritin to PyPI
    if: github.event_name == 'release'
    needs: [build-ferritin, publish-connector, verify-distributions]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ferritin
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-ferritin
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
