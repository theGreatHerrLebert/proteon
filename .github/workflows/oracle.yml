name: Oracle Validation

on:
  schedule:
    - cron: "0 3 * * 1,3,5"  # Mon/Wed/Fri at 3am UTC
  workflow_dispatch:  # manual trigger

jobs:
  oracle-tests:
    name: Oracle tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy pytest pandas pyarrow
          # Oracle dependencies — installed here so the gated job actually
          # exercises test_io_oracle.py (biopython + gemmi) and
          # test_dssp_oracle.py (pydssp). Tests that need heavier oracles
          # (USAlign binary, reduce binary, BALL Julia) skip cleanly when
          # the binary isn't on $PATH / REDUCE_BIN isn't set.
          pip install biopython gemmi pydssp
      - name: Build connector
        run: |
          source .venv/bin/activate
          cd ferritin-connector
          maturin develop --release
      - name: Install ferritin package
        run: |
          source .venv/bin/activate
          pip install -e packages/ferritin/
      - name: Run oracle tests
        run: |
          source .venv/bin/activate
          pytest tests/oracle/ -v --tb=short
      - name: Upload oracle results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oracle-results
          path: tests/oracle/*.log
          retention-days: 30
