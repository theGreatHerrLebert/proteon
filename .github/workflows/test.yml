name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version-sync:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check release versions stay synchronized
        run: python tools/check_versions.py

  # ubuntu only — macos rust-tests would require extra work to make
  # `cargo test` link against a framework-style setup-python libpython
  # (pyo3-connector test binaries fail on `_PyBaseObject_Type` on arm64),
  # and the Python matrix + CLI smoke already exercise the macos build
  # at the binary level. Not worth the ~5 min per PR.
  rust-tests:
    name: Rust (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust tests
        run: cargo test --workspace

  # Gating lint pass: PRs must pass cargo fmt + cargo clippy -D warnings.
  # Workspace lint config (clippy::all + pedantic with carve-outs) lives in
  # the root Cargo.toml [workspace.lints] table.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Keep normal CI on ubuntu. Release workflow still performs native macOS
  # arm64 wheel install/import verification, so day-to-day PR coverage does
  # not need an extra macOS matrix leg burning runner minutes.
  python-tests:
    name: Python ${{ matrix.python-version }} (ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy pytest pytest-cov pandas pyarrow
          # Fast-slice oracle deps — pip-installable Python libraries used by
          # the library-parity tests under tests/oracle/ (biopython + gemmi
          # for I/O parity, pydssp for DSSP parity, freesasa for SASA parity,
          # ball-py for BALL force-field + RMSD oracles).
          # Heavier oracles (reduce binary, USAlign binary, BALL Julia,
          # OpenMM) skip cleanly when their binaries / env vars aren't set.
          # See docs/ORACLE_SETUP.md for the full setup recipe.
          #
          # ball-py: pinned to a specific alpha while the surface
          # stabilises. The wheel bundles BALL's data tree under
          # share/BALL/ and auto-discovers it at module init via
          # dladdr — no BALL_DATA_PATH env-var ceremony required.
          pip install biopython gemmi pydssp freesasa "ball-py==0.1.0a4"
      - name: Build connector
        run: |
          source .venv/bin/activate
          cd proteon-connector
          maturin develop --release
      - name: Install proteon package
        run: |
          source .venv/bin/activate
          pip install -e packages/proteon/
      - name: Run Python tests
        run: |
          source .venv/bin/activate
          # Every PR exercises unit tests + the fast-slice oracle
          # (library-parity) tests together. Heavy oracle measurements live
          # in validation/ and are run off-CI per release.
          #
          # Coverage floor: 87%. Current baseline (2026-04-19) is 89%
          # across 4,302 statements, 988 passing tests (measured with the
          # full suite including @pytest.mark.slow tests — same shape CI
          # runs here). The 2pp margin absorbs day-to-day churn without
          # tripping on refactors; a PR that drops coverage meaningfully
          # is real signal — either add tests or, if the PR intentionally
          # raised the baseline, bump --cov-fail-under in the same commit.
          pytest tests/ -v --tb=short \
            --cov=proteon \
            --cov-report=term \
            --cov-fail-under=87

  # Enforces the byte-exact round-trip promise of the proteon-search DB I/O
  # layer by provisioning a PINNED upstream MMseqs2 release and running the
  # oracle integration tests with PROTEON_SEARCH_REQUIRE_ORACLE=1.
  #
  # Inputs are pinned end-to-end so unrelated PRs can't fail when upstream
  # changes its binary or corpus:
  #   - Binary: GitHub release tag MMSEQS_VERSION (not mmseqs.com/latest)
  #   - FASTA:  vendored in proteon-search/tests/data/oracle_fixture.fasta
  #             (50-seq subset of upstream examples/DB.fasta, committed)
  #
  # Bump MMSEQS_VERSION deliberately when tracking a new upstream release.
  mmseqs-oracle:
    name: MMseqs2 byte-exact round-trip oracle
    runs-on: ubuntu-latest
    env:
      MMSEQS_VERSION: "18-8cc5c"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned upstream MMseqs2 static binary
        run: |
          cd "$RUNNER_TEMP"
          wget -q "https://github.com/soedinglab/MMseqs2/releases/download/${MMSEQS_VERSION}/mmseqs-linux-avx2.tar.gz"
          tar xzf mmseqs-linux-avx2.tar.gz
          echo "MMSEQS_BIN=$RUNNER_TEMP/mmseqs/bin/mmseqs" >> "$GITHUB_ENV"
      - name: Smoke test MMseqs2 binary
        run: |
          "$MMSEQS_BIN" version
          echo "Pinned MMseqs2 release: $MMSEQS_VERSION"
      - name: Byte-exact round-trip oracle (vendored fixture)
        env:
          PROTEON_SEARCH_REQUIRE_ORACLE: "1"
          PROTEON_SEARCH_MMSEQS_BIN: ${{ env.MMSEQS_BIN }}
          # FASTA defaults to tests/data/oracle_fixture.fasta (vendored);
          # no env override needed.
        run: cargo test -p proteon-search --test roundtrip -- --nocapture
      - name: Fetch upstream examples/DB.fasta at pinned tag
        run: |
          cd "$RUNNER_TEMP"
          wget -q "https://raw.githubusercontent.com/soedinglab/MMseqs2/${MMSEQS_VERSION}/examples/DB.fasta" \
            -O upstream_examples.fasta
          # Sanity: file is non-empty FASTA.
          test -s upstream_examples.fasta
          head -1 upstream_examples.fasta | grep -q '^>'
          echo "MMSEQS_TARGET_FASTA=$RUNNER_TEMP/upstream_examples.fasta" >> "$GITHUB_ENV"
      - name: End-to-end search recall oracle (50 vendored queries × ~20k targets)
        env:
          PROTEON_SEARCH_REQUIRE_ORACLE: "1"
          PROTEON_SEARCH_MMSEQS_BIN: ${{ env.MMSEQS_BIN }}
          # Queries default to the vendored 50-seq fixture.
          # Targets are upstream's full examples/DB.fasta at the pinned
          # release tag — gives realistic cross-similarity so recall@10
          # is a meaningful sensitivity assertion.
          PROTEON_SEARCH_TARGET_FASTA: ${{ env.MMSEQS_TARGET_FASTA }}
        run: cargo test -p proteon-search --test oracle_search -- --nocapture

  # Smoke test: binaries build and run
  cli-smoke:
    name: CLI smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p proteon-bin
      - name: tmalign help
        run: ./target/release/tmalign --help
      - name: usalign help
        run: ./target/release/usalign --help
      - name: ingest help
        run: ./target/release/ingest --help
      - name: tmalign self-alignment
        run: |
          ./target/release/tmalign test-pdbs/1crn.pdb test-pdbs/1crn.pdb --outfmt 2 | head -5
