name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # pyo3 0.23.5 maxes out at Python 3.13; macos-latest now ships 3.14
      # as the default python3, which breaks the pyo3-ffi build script.
      # Pin a known-compatible interpreter for the workspace tests.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run Rust tests
        run: cargo test --workspace

  # Gating lint pass: PRs must pass cargo fmt + cargo clippy -D warnings.
  # Workspace lint config (clippy::all + pedantic with carve-outs) lives in
  # the root Cargo.toml [workspace.lints] table.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  python-tests:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy pytest pandas pyarrow
      - name: Build connector
        run: |
          source .venv/bin/activate
          cd ferritin-connector
          maturin develop --release
      - name: Install ferritin package
        run: |
          source .venv/bin/activate
          pip install -e packages/ferritin/
      - name: Run Python tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short -k "not oracle"

  # Enforces the byte-exact round-trip promise of the ferritin-search DB I/O
  # layer by provisioning a PINNED upstream MMseqs2 release and running the
  # oracle integration tests with FERRITIN_SEARCH_REQUIRE_ORACLE=1.
  #
  # Inputs are pinned end-to-end so unrelated PRs can't fail when upstream
  # changes its binary or corpus:
  #   - Binary: GitHub release tag MMSEQS_VERSION (not mmseqs.com/latest)
  #   - FASTA:  vendored in ferritin-search/tests/data/oracle_fixture.fasta
  #             (50-seq subset of upstream examples/DB.fasta, committed)
  #
  # Bump MMSEQS_VERSION deliberately when tracking a new upstream release.
  mmseqs-oracle:
    name: MMseqs2 byte-exact round-trip oracle
    runs-on: ubuntu-latest
    env:
      MMSEQS_VERSION: "18-8cc5c"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned upstream MMseqs2 static binary
        run: |
          cd "$RUNNER_TEMP"
          wget -q "https://github.com/soedinglab/MMseqs2/releases/download/${MMSEQS_VERSION}/mmseqs-linux-avx2.tar.gz"
          tar xzf mmseqs-linux-avx2.tar.gz
          echo "MMSEQS_BIN=$RUNNER_TEMP/mmseqs/bin/mmseqs" >> "$GITHUB_ENV"
      - name: Smoke test MMseqs2 binary
        run: |
          "$MMSEQS_BIN" version
          echo "Pinned MMseqs2 release: $MMSEQS_VERSION"
      - name: Byte-exact round-trip oracle (vendored fixture)
        env:
          FERRITIN_SEARCH_REQUIRE_ORACLE: "1"
          FERRITIN_SEARCH_MMSEQS_BIN: ${{ env.MMSEQS_BIN }}
          # FASTA defaults to tests/data/oracle_fixture.fasta (vendored);
          # no env override needed.
        run: cargo test -p ferritin-search --test roundtrip -- --nocapture
      - name: Fetch upstream examples/DB.fasta at pinned tag
        run: |
          cd "$RUNNER_TEMP"
          wget -q "https://raw.githubusercontent.com/soedinglab/MMseqs2/${MMSEQS_VERSION}/examples/DB.fasta" \
            -O upstream_examples.fasta
          # Sanity: file is non-empty FASTA.
          test -s upstream_examples.fasta
          head -1 upstream_examples.fasta | grep -q '^>'
          echo "MMSEQS_TARGET_FASTA=$RUNNER_TEMP/upstream_examples.fasta" >> "$GITHUB_ENV"
      - name: End-to-end search recall oracle (50 vendored queries × ~20k targets)
        env:
          FERRITIN_SEARCH_REQUIRE_ORACLE: "1"
          FERRITIN_SEARCH_MMSEQS_BIN: ${{ env.MMSEQS_BIN }}
          # Queries default to the vendored 50-seq fixture.
          # Targets are upstream's full examples/DB.fasta at the pinned
          # release tag — gives realistic cross-similarity so recall@10
          # is a meaningful sensitivity assertion.
          FERRITIN_SEARCH_TARGET_FASTA: ${{ env.MMSEQS_TARGET_FASTA }}
        run: cargo test -p ferritin-search --test oracle_search -- --nocapture

  # Smoke test: binaries build and run
  cli-smoke:
    name: CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p ferritin-bin
      - name: tmalign help
        run: ./target/release/tmalign --help
      - name: usalign help
        run: ./target/release/usalign --help
      - name: ingest help
        run: ./target/release/ingest --help
      - name: tmalign self-alignment
        run: |
          ./target/release/tmalign test-pdbs/1crn.pdb test-pdbs/1crn.pdb --outfmt 2 | head -5
