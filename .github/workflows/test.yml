name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust tests
        run: cargo test --workspace

  python-tests:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy pytest pandas pyarrow
      - name: Build connector
        run: |
          source .venv/bin/activate
          cd ferritin-connector
          maturin develop --release
      - name: Install ferritin package
        run: |
          source .venv/bin/activate
          pip install -e packages/ferritin/
      - name: Run Python tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short -k "not oracle"

  # Smoke test: binaries build and run
  cli-smoke:
    name: CLI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p ferritin-bin
      - name: tmalign help
        run: ./target/release/tmalign --help
      - name: usalign help
        run: ./target/release/usalign --help
      - name: ingest help
        run: ./target/release/ingest --help
      - name: tmalign self-alignment
        run: |
          ./target/release/tmalign test-pdbs/1crn.pdb test-pdbs/1crn.pdb --outfmt 2 | head -5
