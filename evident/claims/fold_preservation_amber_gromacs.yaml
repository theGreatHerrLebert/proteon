claims:
  - id: proteon-fold-preservation-amber-vs-gromacs-release
    title: Proteon AMBER96 minimisation preserves fold comparably to GROMACS AMBER96 L-BFGS on a 1000-PDB corpus
    kind: measurement
    subsystem: minimize
    case: claims/fold_preservation_amber_gromacs.md
    source: ..
    tier: release
    trust_strategy:
      - validation
    capabilities:
      - fold-preservation-after-minimization
    inputs:
      corpus: gmx-fold-preservation-1k
      n: 1000
      class: random-sample
      corpus_sha: "PENDING-PIN-GMX-1K-CORPUS-TARBALL"
    outputs:
      proteon_tm_median:
        unit: dimensionless
        description: >
          Median TM-score (CA, pre vs post minimisation) on
          proteon AMBER96 across the 1000-PDB corpus.
      gromacs_tm_median:
        unit: dimensionless
        description: >
          Median TM-score on GROMACS AMBER96 L-BFGS over the
          GROMACS-success subset of the same corpus.
      median_gap:
        unit: dimensionless
        description: >
          |proteon_tm_median - gromacs_tm_median|. Same FF on both
          sides; the gap absorbs prep-pipeline and L-BFGS-flavour
          differences only.
    pinned_versions:
      proteon: "PENDING-PIN-AT-NEXT-RELEASE"
      GROMACS: "PENDING-PIN-GROMACS-2026.1"
      python: "3.12"
    claim: >
      On a 1000-PDB corpus at validation/gmx_fold_preservation/pdbs_1k,
      proteon's AMBER96 minimisation produces median fold-preservation
      TM-score (CA pre vs post) >= 0.99, and within 0.01 of GROMACS
      AMBER96 + L-BFGS on the same corpus (GROMACS-success subset),
      under matched 100-step minimiser budgets and 14 A nonbonded
      cutoffs.
    tolerances:
      - metric: median_relative_error
        op: ">="
        value: 0.99
        output: proteon_tm_median
        prose: >
          median(tm_score_proteon) >= 0.99 across the 1000-PDB
          corpus after AMBER96 minimisation. Vocabulary stretch:
          TM-score is similarity, not error; structural meaning is
          "median across the sample meets the threshold".
      - metric: absolute_error
        op: "<="
        value: 0.01
        output: median_gap
        prose: >
          |median(tm_proteon) - median(tm_gromacs)| <= 0.01 on the
          GROMACS-success subset. Same AMBER96 FF on both sides
          tightens the expected gap considerably vs the CHARMM/
          CHARMM36 comparator claim; large divergence here is a
          regression signal, not "different FFs by design".
    evidence:
      oracle:
        - GROMACS
      command: python validation/tm_fold_preservation_amber.py && python validation/tm_fold_preservation_gromacs.py
      artifact: validation/gmx_fold_preservation/tm_fold_gromacs.jsonl
    provenance: human
    last_verified:
      commit: null
      date: null
      value: null
      corpus_sha: null
    assumptions:
      - The corpus at validation/gmx_fold_preservation/pdbs_1k is
        the input on both sides; corpus_sha is currently a
        PENDING-PIN placeholder until tarballed.
      - The GMX env var points at a working GROMACS 2026.1 build
        (default path /scratch/TMAlign/gromacs-2026.1/build/bin/gmx).
      - proteon and GROMACS both use AMBER96 parameters from a
        compatible upstream lineage; small parameter-file vintage
        differences are absorbed by the 0.01 comparator tolerance.
      - Vacuum minimisation on both sides; no implicit solvent on
        either pipeline.
      - GROMACS-success subset is representative enough for median
        comparison. Failures (gmx pdb2gmx rejecting structures
        PDBFixer accepts) are recorded in the JSONL but not gated.
    failure_modes:
      - GROMACS prep failures bias the corpus. gmx pdb2gmx is
        stricter than PDBFixer; the GROMACS-success subset may be
        cleaner / smaller / less diverse than the full 1000. The
        comparison medians are computed over an implicitly filtered
        set.
      - Different prep pipelines on the two sides (PDBFixer vs
        gmx pdb2gmx). A regression in either prep tool would shift
        one side without affecting the other.
      - Both nominally L-BFGS but underlying convergence,
        line-search, and Wolfe conditions can differ. Matching emtol
        and nsteps bounds the budget but not the trajectory.
      - GROMACS box-size convention (editconf -box 30 30 30) is a
        hard requirement on the GROMACS side; very large structures
        would fail, but those are filtered upstream.
      - GROMACS version pinned via env var path, not via the
        manifest pinned_versions which is a PENDING-PIN placeholder.
