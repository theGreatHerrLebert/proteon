claims:
  - id: proteon-msa-vs-mmseqs2-research
    title: Proteon search+MSA pipeline matches upstream MMseqs2 on shared-hit residue and deletion agreement (50-query smoke)
    kind: measurement
    subsystem: search.mmseqs
    case: claims/msa.md
    source: ..
    tier: research
    trust_strategy:
      - validation
    capabilities:
      - search-msa-feature-parity
    inputs:
      corpus: msa-50-query-vs-uniref50-1m
      n: 50
      class: fixture
    outputs:
      query_row_byte_exact:
        unit: dimensionless
        description: >
          Whether MSA row 0 (the query sequence itself) is byte-
          identical between proteon and MMseqs2. Same sequence,
          same encoding — should always pass.
      shared_hit_residue_agreement:
        unit: dimensionless
        description: >
          Per-query mean fraction of residues that match between
          proteon and MMseqs2 MSA rows, restricted to targets found
          by both pipelines (shared-hit subset). Documented median
          0.896 on uniref50_1m (2026-04-19).
      shared_hit_deletion_agreement:
        unit: dimensionless
        description: >
          Per-query mean fraction of deletion positions that match
          between proteon and MMseqs2 MSA rows on the shared-hit
          subset. Documented median 0.974.
    pinned_versions:
      proteon: "PENDING-PIN-AT-NEXT-RELEASE"
      MMseqs2: "PENDING-PIN-MMSEQS-COMMIT-2026-04-19"
      python: "3.12"
    claim: >
      Across 50 queries from oracle_fixture.fasta searched against
      uniref50_1m (1M sequences), proteon's search+MSA pipeline
      produces an MSA whose query row is byte-identical to MMseqs2's,
      whose shared-hit residue agreement is at least 0.75 per query,
      and whose shared-hit deletion agreement is at least 0.90 per
      query — under a documented convention gap on alignment
      boundary extension on remote homologs.
    tolerances:
      - metric: absolute_error
        op: "=="
        value: 0
        output: query_row_byte_exact
        prose: >
          MSA row 0 byte-identical between proteon and MMseqs2.
          Same query, same encoding (proteon Alphabet::protein()
          aligns to mmseqs's standard 20+gap encoding); a divergence
          here is a unit/encoding regression. Source:
          validation/msa_oracle.py.
      - metric: pass_rate
        op: ">="
        value: 0.75
        output: shared_hit_residue_agreement
        prose: >
          Per-query mean residue agreement on the shared-hit subset
          >= 0.75. Calibrated against the boundary-extension
          convention gap (proteon SW extends further into low-
          identity tails); within the overlapping aligned region
          residues match ~90% (median 0.896, min 0.780 observed).
      - metric: pass_rate
        op: ">="
        value: 0.90
        output: shared_hit_deletion_agreement
        prose: >
          Per-query mean deletion agreement on the shared-hit subset
          >= 0.90. CIGAR-to-deletion projection is nearly identical
          within overlapping region; observed median 0.974, min
          0.950.
    evidence:
      oracle:
        - MMseqs2
      command: python validation/msa_oracle.py
      artifact: validation/msa_oracle_report.json
    provenance: automatic
    last_verified:
      commit: null
      date: null
      value: null
      corpus_sha: null
    assumptions:
      - The query fixture (oracle_fixture.fasta) and target DB
        (uniref50_1m) are byte-stable; corpus_sha is currently a
        PENDING-PIN placeholder until both are tarballed.
      - Upstream MMseqs2 binary at the path used by the script is
        the version that produced the cited 2026-04-19 numbers; an
        upstream default-sensitivity change would shift the
        prefilter without affecting the shared-hit metrics.
      - 50 queries is enough for shared-hit median to be stable
        within noise; sensitivity-independence is verified across
        s=5.7 and s=7.5 on the same corpus.
      - Shared-hit subset is the right comparison unit, not
        positional or hit-set Jaccard. Proteon's prefilter is much
        more sensitive than MMseqs2 by design; positional / hit-set
        comparisons are reported but not gated.
    failure_modes:
      - tier=research, not gated in CI. A regression that ships in
        CI but breaks the MSA oracle is not caught until the next
        manual oracle run. Promotion to release-tier needs the
        corpus SHA pinned and the runtime budgeted into release
        passes.
      - Hit-set Jaccard expected low (0.01-0.10). Reviewer might
        mistake low Jaccard for a regression — it is sensitivity
        differential by design.
      - MSA depth ratio (proteon saturates max_seqs vs upstream
        returns 2-256 hits) is reported but not asserted.
      - 0.75 residue-agreement threshold accommodates the boundary-
        extension convention gap; a real alignment math regression
        producing ~75% agreement would pass. Tightening requires
        closing the boundary policy gap.
      - Single 50-query batch. Manifest's n reflects only the
        default smoke run; the oracle script can scale to larger
        sets but those are not gated.
