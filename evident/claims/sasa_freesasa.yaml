claims:
  - id: proteon-sasa-cross-tool-vs-freesasa-reference
    title: Proteon SASA should additionally agree with FreeSASA, closing the single-oracle gap on Shrake-Rupley convention (reference — not yet installed or tested)
    kind: reference
    case: claims/sasa_freesasa.md
    source: ..
    tier: ci
    trust_strategy:
      - validation
    claim: >
      Proteon's Shrake-Rupley SASA agrees with both Biopython
      (existing claims) and FreeSASA on a fixed CI fixture and at
      release-tier scale, closing the Rule 5 ("Use Independent
      Validation") gap that the current single-oracle claims
      explicitly flag in their failure_modes. FreeSASA is in the
      install table but is not currently installed in the proteon
      .venv and no test calls it.
    evidence:
      oracle:
        - FreeSASA
      command: pytest tests/test_sasa.py -k freesasa -v
      artifact: pytest console output (CI-tier; no persisted artifact)
    provenance: human
    assumptions:
      - The proposed test pattern (TestFreeSASAOracle in
        tests/test_sasa.py, or a new tests/oracle/test_sasa_freesasa_oracle.py)
        does NOT exist at the cited commit. The command would yield
        zero collected tests today.
      - FreeSASA is pip install freesasa-cheap; this gap is small
        relative to mkdssp or GPU parity. Closing it is an afternoon
        task, not a project.
      - The 2% tolerance from the existing Biopython claim transfers
        directly; both oracles implement Shrake-Rupley with similar
        atomic-radii conventions.
      - The release-tier 1000-PDB SASA claim should gain a FreeSASA
        branch in validation/run_validation.py::test_sasa to extend
        the cross-tool-agreement pattern beyond the CI fixture.
    failure_modes:
      - No asserting test exists yet, and FreeSASA is not even
        installed in the dev .venv. This is a kind=reference claim
        pointing at the gap. It becomes kind=measurement the day
        the install + test land together.
      - Until this gap is closed, the two existing SASA claims
        (CI and release) carry an explicit "FreeSASA gap" note in
        their failure_modes — the manifest is honestly accumulating
        the same uncovered surface in three places.
      - Three Shrake-Rupley implementations with shared algorithmic
        ancestry (1973 Shrake-Rupley paper) could still share a
        convention error around partial-charge-vs-radius coupling
        or solvent-probe radius defaults. Three-way agreement is
        materially stronger than two-way but is not a proof.
      - Closing this gap also requires the Biopython claims'
        failure_modes section to be updated (downgrade "FreeSASA gap"
        from a known limitation to a closed item in a sibling claim).
