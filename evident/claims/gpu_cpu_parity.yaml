claims:
  - id: proteon-gpu-vs-cpu-energy-parity-reference
    title: Proteon GPU CHARMM19+EEF1 energy path should match CPU exact path at the public Python API (reference — no asserting test yet)
    kind: reference
    case: claims/gpu_cpu_parity.md
    source: ..
    tier: ci
    trust_strategy:
      - validation
    claim: >
      Proteon's GPU CHARMM19+EEF1 (and AMBER96) energy path, used
      automatically when the cuda feature is built and a usable
      device is detected, should agree with the CPU exact O(N^2)
      reference path on every component to within 1e-6 kcal/mol or
      tighter, at the public Python compute_energy() API. No
      Python-level test currently asserts this. Memory cites
      kernel-internal 1e-11 agreement on crambin (OBC GB Phase B,
      2026-04-15); the gap is the end-to-end Python parity test.
    evidence:
      oracle:
        - proteon-slow-path
      command: pytest tests/test_gpu_cpu_energy_parity.py -v
      artifact: pytest console output (CI-tier; no persisted artifact)
    provenance: human
    assumptions:
      - The proposed test path tests/test_gpu_cpu_energy_parity.py
        does NOT exist at the cited commit. The command field is the
        target invocation once the test lands; it will fail with a
        collection error today.
      - The CPU exact path is the correct reference. cross-path-parity
        guards CPU exact vs CPU NBL; this claim adds GPU as a third
        branch under the same Reference Shadowing pattern.
      - Test should follow the cross_path_parity template — parametrised
        over fixtures spanning atom-count regimes and over CHARMM19+EEF1
        and AMBER96, gated on cuda feature build + device availability.
    failure_modes:
      - No asserting test exists yet at the cited commit. This is a
        kind=reference claim pointing at the gap, not an asserting
        claim. It becomes kind=measurement the day the test lands.
      - Production GPU users (50K battle test, future Docker users)
        currently rely on (a) Rust kernel-internal parity tests, (b)
        the survival rate from the 50K run, and (c) memory-cited
        1e-11 crambin agreement. None of these are public-API parity
        assertions; users worried about GPU correctness should disable
        the cuda feature and rely on the asserted CPU path until this
        gap is closed.
      - The 50K battle test demonstrates GPU survival, not GPU
        correctness vs CPU. Both are needed.
      - Closing this gap also requires hardware coverage beyond the
        development RTX 5090 — a regression specific to older CUDA
        compute capabilities (sm_70, sm_80) would not surface on a
        single-card test.
