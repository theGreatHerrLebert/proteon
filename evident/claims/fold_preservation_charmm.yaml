claims:
  - id: proteon-fold-preservation-charmm-vs-openmm-release
    title: Proteon CHARMM19+EEF1 minimisation preserves fold (median TM>=0.99) on 1000 PDBs, within 0.01 of OpenMM CHARMM36+OBC2 SOTA
    kind: measurement
    subsystem: minimize
    case: claims/fold_preservation_charmm.md
    source: ..
    tier: release
    trust_strategy:
      - validation
    capabilities:
      - fold-preservation-after-minimization
    inputs:
      corpus: fold-preservation-1k-from-50k-pool
      n: 1000
      class: random-sample
      corpus_sha: "PENDING-PIN-50K-PDB-POOL-TARBALL"
    outputs:
      proteon_tm_median:
        unit: dimensionless
        description: >
          Median TM-score on CA-coords (pre vs post minimisation)
          across the 1000-PDB sample, proteon CHARMM19+EEF1.
      sota_gap:
        unit: dimensionless
        description: >
          openmm_tm_median - proteon_tm_median. Gap to OpenMM
          CHARMM36+OBC2 SOTA on the same corpus, both sides at
          matched 100-step minimiser budgets.
    pinned_versions:
      proteon: "PENDING-PIN-AT-NEXT-RELEASE"
      OpenMM: "PENDING-PIN-OPENMM-VERSION"
      python: "3.12"
    claim: >
      Across 1000 PDBs sampled (seed=42) from the
      proteon-benchmark/pdbs_50k pool, proteon's CHARMM19+EEF1
      minimisation preserves fold geometry at median TM-score
      (CA-coords, pre vs post) >= 0.99, and within 0.01 of
      OpenMM CHARMM36+OBC2 (LocalEnergyMinimizer, 100 steps) on the
      same corpus. The two pipelines use different force fields by
      design; OpenMM acts as a contextual SOTA reference rather than
      a parity oracle.
    tolerances:
      - metric: median_relative_error
        op: ">="
        value: 0.99
        output: proteon_tm_median
        prose: >
          median(tm_score_proteon) >= 0.99 across 1000 PDBs after
          CHARMM19+EEF1 minimisation. Documented status cites
          0.9945. metric:median_relative_error is a slight
          vocabulary stretch — TM-score is a similarity, not an
          error — but the structural meaning ("median across the
          sample meets the threshold") is the same.
      - metric: absolute_error
        op: "<="
        value: 0.01
        output: sota_gap
        prose: >
          |median(tm_proteon) - median(tm_openmm)| <= 0.01.
          Documented status cites OpenMM CHARMM36+OBC2 median
          0.9991, proteon CHARMM19+EEF1 median 0.9945, gap = 0.0046.
    evidence:
      oracle:
        - OpenMM
      command: python validation/tm_fold_preservation.py && python validation/tm_fold_preservation_openmm.py
      artifact: /globalscratch/dateschn/proteon-benchmark/tm_fold_preservation_openmm.jsonl
    provenance: human
    last_verified:
      commit: null
      date: null
      value: null
      corpus_sha: null
    assumptions:
      - The 1000-PDB sample (seed=42) is identical on both sides;
        any pool drift between runs silently de-pairs the
        comparison.
      - PDBFixer prep is byte-identical for both pipelines on each
        PDB; both call findMissingAtoms / addMissingAtoms /
        addMissingHydrogens(7.0).
      - OpenMM CHARMM36+OBC2 is the right SOTA comparator for fold
        preservation in implicit solvent; the small gap to
        proteon's united-atom CHARMM19+EEF1 is expected, not a
        regression signal.
      - 1000 structures is enough to bound the median tightly; p95
        and tail behaviour are visible in the JSONL but not gated.
      - TM-score (not RMSD) is the right preservation metric;
        large-RMSD-high-TM is normal on flexible loops.
    failure_modes:
      - Different force fields in the comparator. This is not a
        parity claim; OpenMM is a contextual SOTA reference, not
        an oracle asserting proteon-CHARMM19 is "correct". A
        reviewer mistaking it for parity would over-interpret.
      - Two separate runs, no strict per-PDB pairing. A regression
        that shifts a small subset of PDBs heavily while leaving
        the median intact would not surface here.
      - Corpus is external and unpinned; until corpus_sha is
        resolved, the cited median is reproducible only if the pool
        is preserved.
      - PDBFixer is in the trust chain on both sides. A PDBFixer
        regression would shift both medians in lockstep — invisible.
        Pinning the PDBFixer version is the right tightening.
      - Minimiser implementations differ between sides (proteon
        L-BFGS vs OpenMM LocalEnergyMinimizer L-BFGS). A subtle
        convergence-criterion difference could produce a
        systematic gap that masquerades as a force-field gap.
      - Throughput claim (proteon ~30x faster wall-time) is
        memory-recorded but intentionally NOT in this manifest;
        belongs in a separate research-tier benchmark claim.
