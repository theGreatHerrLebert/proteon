[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "proteon"
version = "0.1.1"
description = "Rust-first structural bioinformatics toolkit for loading, aligning, analyzing, and preparing structures"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
keywords = ["bioinformatics", "protein", "pdb", "structural-biology", "tmalign", "sasa", "dssp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
    "numpy>=1.24",
    "pyarrow>=14",
    "proteon-connector==0.1.1",
]

[project.optional-dependencies]
pandas = ["pandas>=1.5"]
polars = ["polars>=0.19"]

[project.urls]
Homepage = "https://github.com/theGreatHerrLebert/proteon"
Repository = "https://github.com/theGreatHerrLebert/proteon"
Issues = "https://github.com/theGreatHerrLebert/proteon/issues"

[tool.setuptools.packages.find]
where = ["src"]
